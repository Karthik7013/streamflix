<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" fill="none">
  <!-- Background -->
  <rect width="800" height="450" fill="#0d1a12" rx="8"/>
  <!-- Gradient overlay -->
  <defs>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2937" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0d1a12" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <!-- Hero image area -->
  <rect x="40" y="30" width="720" height="300" fill="#162b1e" rx="12"/>
  <!-- Play button -->
  <circle cx="400" cy="180" r="40" fill="#10b981" opacity="0.9"/>
  <polygon points="388,164 388,196 418,180" fill="#0d1a12"/>
  <!-- Top bar -->
  <rect x="60" y="50" width="100" height="12" fill="#10b981" rx="6" opacity="0.8"/>
  <rect x="680" y="50" width="60" height="12" fill="#ffffff" rx="6" opacity="0.15"/>
  <rect x="620" y="50" width="50" height="12" fill="#ffffff" rx="6" opacity="0.15"/>
  <!-- Film strip sprockets top -->
  <circle cx="60" cy="30" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="80" cy="30" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="100" cy="30" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="120" cy="30" r="3" fill="#10b981" opacity="0.3"/>
  <!-- Film strip sprockets bottom -->
  <circle cx="60" cy="420" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="80" cy="420" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="100" cy="420" r="3" fill="#10b981" opacity="0.3"/>
  <circle cx="120" cy="420" r="3" fill="#10b981" opacity="0.3"/>
  <!-- Title -->
  <rect x="40" y="355" width="200" height="16" fill="#ffffff" rx="3" opacity="0.9"/>
  <rect x="40" y="378" width="350" height="10" fill="#ffffff" rx="3" opacity="0.4"/>
  <rect x="40" y="393" width="250" height="10" fill="#ffffff" rx="3" opacity="0.25"/>
  <!-- Buttons -->
  <rect x="40" y="415" width="90" height="26" fill="url(#grad)" rx="13"/>
  <rect x="145" y="415" width="90" height="26" fill="#ffffff" rx="13" opacity="0.1"/>
  <!-- Bottom cards -->
  <rect x="530" y="355" width="70" height="100" fill="#162b1e" rx="6" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="615" y="355" width="70" height="100" fill="#162b1e" rx="6" stroke="#ffffff" stroke-opacity="0.06"/>
  <rect x="700" y="355" width="70" height="100" fill="#162b1e" rx="6" stroke="#ffffff" stroke-opacity="0.06"/>
  <!-- Card thumbnails -->
  <rect x="540" y="362" width="50" height="40" fill="#1a3324" rx="4"/>
  <rect x="625" y="362" width="50" height="40" fill="#1a3324" rx="4"/>
  <rect x="710" y="362" width="50" height="40" fill="#1a3324" rx="4"/>
  <rect x="540" y="410" width="50" height="8" fill="#ffffff" rx="2" opacity="0.5"/>
  <rect x="625" y="410" width="50" height="8" fill="#ffffff" rx="2" opacity="0.5"/>
  <rect x="710" y="410" width="50" height="8" fill="#ffffff" rx="2" opacity="0.5"/>
  <rect x="540" y="422" width="30" height="6" fill="#ffffff" rx="2" opacity="0.25"/>
  <rect x="625" y="422" width="30" height="6" fill="#ffffff" rx="2" opacity="0.25"/>
  <rect x="710" y="422" width="30" height="6" fill="#ffffff" rx="2" opacity="0.25"/>
  <!-- Bottom bar -->
  <rect x="60" y="435" width="200" height="6" fill="#ffffff" rx="3" opacity="0.08"/>
  <circle cx="750" cy="438" r="4" fill="#ffffff" opacity="0.15"/>
  <circle cx="735" cy="438" r="4" fill="#ffffff" opacity="0.15"/>
  <circle cx="720" cy="438" r="4" fill="#ffffff" opacity="0.15"/>
</svg>
